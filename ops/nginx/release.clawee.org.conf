# release.clawee.org — public install channel (static)
#
# Serves the static surface mirrored by tools/release.sh to STATIC_DIR:
#   index.html, clawee-release.pub, <comp>/install.sh
#
# Host: nsm.renative.com (also fronts console / umbree / burree / the burrowee
# release channel). Behind Cloudflare in Full (strict) mode — origin presents a
# real cert, CF connects over TLS and validates it. See ops/README.md for
# operator activation.
#
# DEPLOY LOCATION (nsm specifics — see ops/README.md):
#   This host's nginx.conf includes ONLY /etc/nginx/sites-enabled/* — it does
#   NOT include /etc/nginx/conf.d/*.conf. Drop this file into
#   /etc/nginx/sites-enabled/ (the .conf extension is fine there). A copy under
#   conf.d/ is SILENTLY IGNORED.
#   This host's nginx build also rejects TLSv1.3 — keep ssl_protocols at TLSv1.2.
#   Do NOT mark this server default_server: another sites-enabled file already
#   owns default_server on :443.

server {
    listen 80;
    listen [::]:80;
    server_name release.clawee.org;

    # Cloudflare handles the public redirect; this is a belt-and-suspenders
    # bounce for any direct-to-origin http hit.
    return 301 https://release.clawee.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name release.clawee.org;

    # === TLS — OPERATOR PLACEHOLDERS ===========================================
    # Issue/point these at the host cert for release.clawee.org, then reload.
    # (Mirror the console / release.burrowee.com vhosts on this host.) On nsm,
    # ONLY TLSv1.2 is accepted.
    ssl_certificate     /etc/letsencrypt/live/release.clawee.org/fullchain.pem;  # OPERATOR: set real path
    ssl_certificate_key /etc/letsencrypt/live/release.clawee.org/privkey.pem;    # OPERATOR: set real path
    ssl_protocols       TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # ===========================================================================

    # Static root — must match release.sh STATIC_DIR.
    root  /ebs_storage/apps/release.clawee.org/static;
    index index.html;

    server_tokens off;
    charset utf-8;

    # Inner-loop hygiene: the install one-liners are piped into `sh`, so the
    # served bytes must be exact. No transforms, short cache.
    location / {
        try_files $uri $uri/ =404;
    }

    # Bootstrap installers: served as a shell script so `curl … | sh` is honest
    # about the content type, and never cached stale at the edge for long.
    location ~ \.sh$ {
        default_type  text/x-shellscript;
        add_header    Cache-Control "public, max-age=300";
        try_files     $uri =404;
    }

    # The signing public key — plain text, the trust anchor for manual verify.
    location = /clawee-release.pub {
        default_type  text/plain;
        add_header    Cache-Control "public, max-age=300";
    }

    # SHA256SUMS / signatures if ever served from the static surface — plain text.
    location ~ \.(txt|minisig)$ {
        default_type  text/plain;
        try_files     $uri =404;
    }
}
